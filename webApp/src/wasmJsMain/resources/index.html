<!DOCTYPE html>
<html lang="en" style="background:#121212;color-scheme:dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#121212">
    <base href="/">
    <link rel="icon" href="favicon.png?v=2" type="image/png" sizes="32x32">
    <title>QuietGuard — Open-source, no-root firewall</title>
    <meta name="description" content="QuietGuard is a local-first, open-source firewall for Android. Control per-app Wi-Fi and mobile data access without root.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://quietguard.vercel.app/">
    <link rel="author" href="https://github.com/bernaferrari/QuietGuard">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="QuietGuard">
    <meta property="og:title" content="QuietGuard — Open-source, no-root firewall">
    <meta property="og:description" content="Control per-app Wi-Fi and mobile data access with a local-first Android firewall.">
    <meta property="og:url" content="https://quietguard.vercel.app/">
    <meta property="og:image" content="https://quietguard.vercel.app/social.png">
    <meta property="og:image:width" content="1280">
    <meta property="og:image:height" content="640">
    <meta property="og:image:alt" content="QuietGuard firewall overview">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="QuietGuard — Open-source, no-root firewall">
    <meta name="twitter:description" content="Control per-app Wi-Fi and mobile data access with a local-first Android firewall.">
    <meta name="twitter:image" content="https://quietguard.vercel.app/social.png">
    <meta name="twitter:image:alt" content="QuietGuard firewall overview">
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "SoftwareApplication",
            "name": "QuietGuard",
            "applicationCategory": "SecurityApplication",
            "operatingSystem": "Android, Web",
            "description": "A local-first, open-source firewall that controls per-app Wi-Fi and mobile data access without root.",
            "url": "https://quietguard.vercel.app/",
            "image": "https://quietguard.vercel.app/social.png",
            "sameAs": ["https://github.com/bernaferrari/QuietGuard"]
        }
    </script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #121212;
        }
        #loading {
            color: #e8e8e8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            width: 100%;
            height: 100%;
            background: #121212;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(232, 232, 232, 0.15);
            border-top-color: #90caf9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .label {
            margin: 0;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div id="loading" role="status" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <p class="label">Loading QuietGuard…</p>
</div>
<script src="netguard.js"></script>
</body>
</html>
